# CircleCI -- Revyl test pipeline
#
# Add REVYL_API_KEY in Project Settings > Environment Variables.

version: 2.1

jobs:
  revyl-tests:
    docker:
      - image: cimg/base:current
    environment:
      REVYL_INSTALL_DIR: /usr/local/bin
    steps:
      - checkout
      - run:
          name: Install Revyl CLI
          command: curl -fsSL https://raw.githubusercontent.com/RevylAI/revyl-cli/main/scripts/install.sh | sh
      - run:
          name: Run tests
          command: revyl workflow run smoke-tests

  # Optional: build, upload, then test
  # build-and-test:
  #   docker:
  #     - image: cimg/base:current
  #   environment:
  #     REVYL_INSTALL_DIR: /usr/local/bin
  #   steps:
  #     - checkout
  #     - run: curl -fsSL https://raw.githubusercontent.com/RevylAI/revyl-cli/main/scripts/install.sh | sh
  #     - run: ./gradlew assembleDebug
  #     - run: revyl build upload --file ./app.apk --app your-app-id --set-current
  #     - run: revyl workflow run smoke-tests

workflows:
  test-on-pr:
    jobs:
      - revyl-tests
