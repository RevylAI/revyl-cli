# CircleCI -- Revyl test pipeline
#
# Add REVYL_API_KEY in Project Settings > Environment Variables.

version: 2.1

jobs:
  # Blocking: waits for tests to complete
  revyl-tests:
    docker:
      - image: cimg/base:current
    environment:
      REVYL_INSTALL_DIR: /usr/local/bin
    steps:
      - checkout
      - run:
          name: Install Revyl CLI
          command: curl -fsSL https://revyl.com/install.sh | sh
      - run:
          name: Run tests
          command: revyl workflow run smoke-tests

  # Fire-and-forget: queue tests and exit immediately
  revyl-tests-async:
    docker:
      - image: cimg/base:current
    environment:
      REVYL_INSTALL_DIR: /usr/local/bin
    steps:
      - checkout
      - run:
          name: Install Revyl CLI
          command: curl -fsSL https://revyl.com/install.sh | sh
      - run:
          name: Queue tests (fire-and-forget)
          command: revyl workflow run smoke-tests --no-wait

  # Check status of the latest execution
  revyl-check-status:
    docker:
      - image: cimg/base:current
    environment:
      REVYL_INSTALL_DIR: /usr/local/bin
    steps:
      - run:
          name: Install Revyl CLI
          command: curl -fsSL https://revyl.com/install.sh | sh
      - run:
          name: Check workflow status
          command: revyl workflow status smoke-tests --json

  # Optional: build, upload, then test
  # build-and-test:
  #   docker:
  #     - image: cimg/base:current
  #   environment:
  #     REVYL_INSTALL_DIR: /usr/local/bin
  #   steps:
  #     - checkout
  #     - run: curl -fsSL https://revyl.com/install.sh | sh
  #     - run: ./gradlew assembleDebug
  #     - run: revyl build upload --file ./app.apk --app your-app-id --set-current
  #     - run: revyl workflow run smoke-tests

workflows:
  test-on-pr:
    jobs:
      - revyl-tests

  # Async: queue then check status later
  # test-async:
  #   jobs:
  #     - revyl-tests-async
  #     - revyl-check-status:
  #         requires:
  #           - revyl-tests-async
