# Screwdriver CI -- Revyl test pipeline
#
# Add REVYL_API_KEY as a secret in your Screwdriver pipeline settings.

shared:
  image: alpine:latest
  environment:
    REVYL_API_KEY: ${REVYL_API_KEY}
    REVYL_INSTALL_DIR: /usr/local/bin

jobs:
  # Run tests on every PR and commit (blocks until complete)
  test:
    requires: [~pr, ~commit]
    steps:
      - install-deps: apk add --no-cache curl
      - install: curl -fsSL https://raw.githubusercontent.com/RevylAI/revyl-cli/main/scripts/install.sh | sh
      - run-tests: revyl workflow run smoke-tests

  # Fire-and-forget: queue tests and exit immediately
  test-async:
    requires: [~pr, ~commit]
    steps:
      - install-deps: apk add --no-cache curl
      - install: curl -fsSL https://raw.githubusercontent.com/RevylAI/revyl-cli/main/scripts/install.sh | sh
      - run-tests: revyl workflow run smoke-tests --no-wait

  # Check status of the latest execution
  check-status:
    requires: [test-async]
    steps:
      - install-deps: apk add --no-cache curl
      - install: curl -fsSL https://raw.githubusercontent.com/RevylAI/revyl-cli/main/scripts/install.sh | sh
      - status: revyl workflow status smoke-tests --json

  # Build, upload, then test
  build-and-test:
    requires: [~commit]
    steps:
      - install-deps: apk add --no-cache curl
      - install: curl -fsSL https://raw.githubusercontent.com/RevylAI/revyl-cli/main/scripts/install.sh | sh
      - build: ./gradlew assembleDebug   # <-- replace with your build command
      - upload: revyl build upload --file ./app/build/outputs/apk/debug/app-debug.apk --app your-app-id --set-current
      - test: revyl workflow run smoke-tests
