# GitLab CI/CD -- Revyl test pipeline
#
# Add REVYL_API_KEY as a CI/CD variable in Settings > CI/CD > Variables (masked).

stages:
  - build
  - test
  - status

variables:
  REVYL_INSTALL_DIR: /usr/local/bin

build:
  stage: build
  image: alpine:latest
  script:
    - echo "Build your app here"
    # - ./gradlew assembleDebug
  # artifacts:
  #   paths:
  #     - app/build/outputs/apk/

# Blocking: waits for tests to complete
test:
  stage: test
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
    - curl -fsSL https://raw.githubusercontent.com/RevylAI/revyl-cli/main/scripts/install.sh | sh
  script:
    - revyl workflow run smoke-tests
  # Optional: upload build first
  # script:
  #   - revyl build upload --file ./app.apk --app your-app-id --set-current
  #   - revyl workflow run smoke-tests

# Fire-and-forget: queue tests and exit immediately
test-async:
  stage: test
  image: alpine:latest
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  before_script:
    - apk add --no-cache curl
    - curl -fsSL https://raw.githubusercontent.com/RevylAI/revyl-cli/main/scripts/install.sh | sh
  script:
    - revyl workflow run smoke-tests --no-wait

# Check status of the latest execution (runs after async test)
check-status:
  stage: status
  image: alpine:latest
  needs: [test-async]
  before_script:
    - apk add --no-cache curl
    - curl -fsSL https://raw.githubusercontent.com/RevylAI/revyl-cli/main/scripts/install.sh | sh
  script:
    - revyl workflow status smoke-tests --json
