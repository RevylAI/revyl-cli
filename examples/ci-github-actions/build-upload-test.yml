# Build your app, upload to Revyl, then run tests against the new build.

name: Build and Test

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # -- Your build step here --
      # - name: Build APK
      #   run: ./gradlew assembleDebug

      - name: Install Revyl CLI
        run: curl -fsSL https://revyl.com/install.sh | sh

      - name: Upload Build to Revyl
        id: upload
        run: |
          revyl build upload \
            --file ./app/build/outputs/apk/debug/app-debug.apk \
            --app "$REVYL_ANDROID_APP_ID" \
            --platform android \
            --version "$REVYL_PR_HEAD_SHA" \
            --set-current \
            --yes \
            --json
        env:
          REVYL_API_KEY: ${{ secrets.REVYL_API_KEY }}
          REVYL_ANDROID_APP_ID: ${{ vars.REVYL_ANDROID_APP_ID }}
          REVYL_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Run Tests on New Build
        run: revyl workflow run "$REVYL_WORKFLOW_ID" --android-app "$REVYL_ANDROID_APP_ID"
        env:
          REVYL_API_KEY: ${{ secrets.REVYL_API_KEY }}
          REVYL_WORKFLOW_ID: ${{ vars.REVYL_WORKFLOW_ID }}
          REVYL_ANDROID_APP_ID: ${{ vars.REVYL_ANDROID_APP_ID }}
