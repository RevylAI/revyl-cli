# Expo/EAS: build, upload to Revyl, then run tests.
#
# iOS .tar.gz files from EAS are automatically converted to .zip.
#
# Secrets needed: REVYL_API_KEY, EXPO_TOKEN

name: Expo Build and Test

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Revyl CLI
        run: curl -fsSL https://revyl.com/install.sh | sh

      - name: Build with EAS
        id: eas-build
        run: |
          npx eas-cli build --platform ios --profile production --non-interactive --wait --json > build-result.json
          echo "build-url=$(jq -r '.[0].artifacts.buildUrl' build-result.json)" >> "$GITHUB_OUTPUT"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload to Revyl
        id: upload
        run: |
          revyl build upload \
            --url "${{ steps.eas-build.outputs.build-url }}" \
            --header "Authorization: Bearer $EXPO_TOKEN" \
            --app "$REVYL_IOS_APP_ID" \
            --platform ios \
            --version "$REVYL_PR_HEAD_SHA" \
            --set-current \
            --yes \
            --json
        env:
          REVYL_API_KEY: ${{ secrets.REVYL_API_KEY }}
          REVYL_IOS_APP_ID: ${{ vars.REVYL_IOS_APP_ID }}
          REVYL_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Run Tests
        run: revyl workflow run "$REVYL_WORKFLOW_ID" --ios-app "$REVYL_IOS_APP_ID"
        env:
          REVYL_API_KEY: ${{ secrets.REVYL_API_KEY }}
          REVYL_WORKFLOW_ID: ${{ vars.REVYL_WORKFLOW_ID }}
          REVYL_IOS_APP_ID: ${{ vars.REVYL_IOS_APP_ID }}
