# .revyl/config.yaml -- project configuration
#
# Generated by `revyl init`. Edit directly or use `revyl config set <key> <value>`.

project:
  name: my-mobile-app

build:
  system: gradle                     # gradle, xcode, expo, flutter, or custom
  platforms:
    android:
      command: ./gradlew assembleDebug
      output: app/build/outputs/apk/debug/app-debug.apk
    # ios:
    #   command: xcodebuild -scheme MyApp -sdk iphonesimulator
    #   output: build/MyApp.app

defaults:
  open_browser: true
  timeout: 600                       # seconds
